<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Rename Imported Layers</title>
  <style>
    body{font-family:Inter, system-ui, Arial;margin:12px}
    textarea{width:100%;height:220px;font-size:12px}
    button{padding:8px 12px;margin-top:8px}
    .small{font-size:12px;color:#555}
  </style>
</head>
<body>
  <h3>Rename Imported Layers</h3>
  <p class="small">Paste JSON array of mappings: [{"dataLayerName":"hero.visual","figmaName":"Hero / Visual"}, ...]</p>
  <textarea id="mapping" placeholder='Paste mapping JSON or CSV here'></textarea>
  <div style="display:flex;gap:8px">
    <button id="apply">Apply Renames</button>
    <button id="sample">Insert Sample</button>
  </div>
  <div id="status" class="small"></div>

  <script>
    const mappingEl = document.getElementById('mapping');
    const apply = document.getElementById('apply');
    const sample = document.getElementById('sample');
    const status = document.getElementById('status');

    // Try to load mapping.json shipped with plugin for convenience
    (async function tryLoadDefault(){
      try{
        const resp = await fetch('mapping.json');
        if(!resp.ok) throw new Error('no mapping.json');
        const json = await resp.json();
        mappingEl.value = JSON.stringify(json.map(item=>({dataLayerName:item.dataLayerName,figmaName:item.figmaName})), null, 2);
        status.textContent = 'Loaded default mapping.';
      }catch(e){
        // leave placeholder
      }
    })();

    sample.onclick = () => {
      const sampleJson = [
        {"dataLayerName":"hero.visual","figmaName":"Hero / Visual"},
        {"dataLayerName":"hero.card-1","figmaName":"Hero / Card 1"}
      ];
      mappingEl.value = JSON.stringify(sampleJson, null, 2);
    };

    apply.onclick = () => {
      let text = mappingEl.value.trim();
      if (!text) { status.textContent = 'Paste mapping JSON first.'; return; }
      try {
        const parsed = JSON.parse(text);
        parent.postMessage({ pluginMessage: { type: 'rename', mapping: parsed } }, '*');
        status.textContent = 'Renaming...';
      } catch (e) {
        status.textContent = 'Invalid JSON: ' + e.message;
      }
    };

    onmessage = (e) => {
      const msg = e.data.pluginMessage;
      if (msg.type === 'done') {
        status.textContent = `Renamed ${msg.renamed} nodes.`;
      }
    };
  </script>
</body>
</html>
