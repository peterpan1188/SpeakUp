<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SpeakUp — Footer Snapshot</title>
  <style>
    body{font-family:Inter, system-ui, Arial;margin:0;background:#f5f7fa}
    .frame{max-width:920px;margin:28px auto;background:#fff;padding:24px;border-radius:8px;border:1px solid #e6edf3}
    .cols{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
    .col h5{margin:0 0 8px 0}
    .cta{margin-top:10px}
    .foot{border-top:1px solid #edf2f7;padding-top:12px;margin-top:12px;color:#6b7280;font-size:13px}
  </style>
</head>
<body>
  <div class="frame" data-layer-name="footer.frame">
    <div class="cols" data-layer-name="footer.columns">
      <div class="col" data-layer-name="footer.brand">
        <div style="font-weight:800">SpeakUp</div>
        <div style="font-size:12px;color:#6b7280">Every Voice Matters</div>
      </div>
      <div class="col" data-layer-name="footer.links">
        <h5>Links</h5>
        <div>Why</div>
        <div>Features</div>
      </div>
      <div class="col" data-layer-name="footer.contact">
        <h5>Contact</h5>
        <button data-layer-name="footer.cta" style="padding:10px 16px;border-radius:10px;border:1px solid #111;background:#fff;font-weight:700">Talk To Us</button>
      </div>
    </div>
    <div class="foot">© 2026 SpeakUp Network — Building safer communities for every student.</div>
  </div>
</body>
</html>
