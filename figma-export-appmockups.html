<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SpeakUp — App Mockups Snapshot</title>
  <style>
    body{font-family:Inter, system-ui, Arial;margin:0;background:#f5f7fa}
    .frame{max-width:920px;margin:28px auto;background:#fff;padding:24px;border-radius:8px;border:1px solid #e6edf3}
    .cols{display:grid;grid-template-columns:1fr 380px;gap:20px}
    .phone{width:320px;height:620px;border-radius:46px;background:#0b1220;padding:10px;display:flex;align-items:center;justify-content:center}
    .screen{width:100%;height:100%;background:#fff;border-radius:36px;padding:16px;box-sizing:border-box}
    .features{display:flex;flex-direction:column;gap:18px}
    .note{background:#fafafa;border:1px solid #e6edf3;padding:12px;border-radius:12px}
  </style>
</head>
<body>
  <div class="frame" data-layer-name="appmockups.frame">
    <div class="cols">
      <div class="features" data-layer-name="appmockups.features">
        <h3>App Mockups</h3>
        <p>Key features and short bullets for clarity.</p>
        <div class="note" data-layer-name="appmockups.floating-note">Quick note: interactive prototype for demos.</div>
      </div>

      <div style="display:flex;align-items:center;justify-content:center">
        <div class="phone" data-layer-name="appmockups.phone-frame">
          <div class="screen" data-layer-name="appmockups.screen-canvas">
            <h4 style="margin:0">Phone Screen</h4>
            <img src="https://picsum.photos/seed/phone/300/560" alt="phone-screen" style="width:100%;height:auto;border-radius:12px;margin-top:12px"/>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
